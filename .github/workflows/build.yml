name: Build & Scan Docker Image
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Semgrep SAST Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            semgrep/semgrep:1.160.0 \
            semgrep scan \
              --config auto \
              --config p/security-audit \
              --sarif \
              --output /src/semgrep.sarif \
              --error \
              --verbose \
              /src

      - name: Upload Semgrep SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-sast

      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: warning

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t inchange/${{ vars.DOCKER_IMAGE }}:latest .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: inchange/${{ vars.DOCKER_IMAGE }}:latest
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Save Docker image
        run: docker save inchange/${{ vars.DOCKER_IMAGE }}:latest -o ${{ vars.DOCKER_IMAGE }}.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.DOCKER_IMAGE }}
          path: ${{ vars.DOCKER_IMAGE }}.tar
          retention-days: 1
